repos:
  # NOTE: Markdown
  - repo: https://github.com/oxc-project/mirrors-oxfmt
    rev: v0.44.0
    hooks:
      - id: oxfmt
        types_or: [markdown]
  # NOTE: TOML
  - repo: https://github.com/tombi-toml/tombi-pre-commit
    rev: v0.9.17
    hooks:
      - id: tombi-format
      - id: tombi-lint
